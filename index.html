<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="styles.css" />
  <title>Carta de Ofertas</title>
</head>
<body>
  <header id="app-header">
    <button id="cart-toggle" aria-label="Abrir carrito">🛒
      <span id="cart-badge" class="cart-badge" aria-hidden="true">0</span>
    </button>
    <div class="header-title">Ver Carrito</div>
  </header>

  <!-- Left sidebar cart -->
  <aside id="cart-sidebar" aria-hidden="true">
    <header class="cart-header">
      <h3>Tu Carrito</h3>
    </header>
    <div class="cart-body">
      <ul id="cart-items-list" class="cart-items-list"></ul>
    </div>
    <footer class="cart-footer">
      <div class="cart-total-row">
        <span>Total</span>
        <strong id="cart-total">$ 0.00</strong>
      </div>
      <div class="cart-footer-actions">
        <button id="cart-close-btn" class="btn">Cerrar</button>
        <button id="order-btn" class="btn btn-primary">Crear pedido</button>
      </div>
    </footer>
  </aside>

  <main id="menu-container" aria-live="polite"></main>

  <!-- Modal de Carrito (añadir) -->
  <div id="cart-modal" class="modal-hidden" aria-hidden="true">
    <div class="modal-backdrop" id="cart-backdrop"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="cart-title">
      <header class="modal-header">
        <h3 id="cart-title">Añadir al carrito</h3>
        <button id="cart-close" class="modal-close" aria-label="Cerrar">✕</button>
      </header>

      <div class="modal-body">
        <div class="image-wrapper-outer">
          <div class="image-wrapper">
            <img id="cart-item-image" src="" alt="" class="item-image">
            <div id="cart-item-image-placeholder" class="image-placeholder">Sin imagen</div>
          </div>
        </div>

        <div class="item-name" id="cart-item-name"></div>

        <div class="counter-row">
          <button id="counter-decr" class="counter-btn" aria-label="Disminuir">−</button>
          <div id="counter-value" class="counter-value">1</div>
          <button id="counter-incr" class="counter-btn" aria-label="Aumentar">+</button>
        </div>
      </div>

      <footer class="modal-footer">
        <button id="cart-add" class="btn btn-primary">Añadir</button>
        <button id="cart-cancel" class="btn">Cerrar</button>
      </footer>
    </div>
  </div>

  <!-- Ordenar: formulario modal integrado con web3forms -->
  <div id="order-modal" class="modal-hidden" aria-hidden="true">
    <div class="modal-backdrop" id="order-backdrop"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="order-title">
      <header class="modal-header">
        <h3 id="order-title">Completa tu pedido</h3>
        <button id="order-close" class="modal-close" aria-label="Cerrar">✕</button>
      </header>

      <div class="modal-body">
        <form id="pedidoForm">

          <div class="form-row">
            <label for="cust-name">Nombre</label>
            <input type="text" name="Nombre" id="cust-name" autocomplete="name" placeholder="Introduzca su nombre" required />
          </div>

          <div class="form-inline-row">
            <div class="form-row">
              <label for="cust-phone">Teléfono</label>
              <input type="tel" name="Telefono" id="cust-phone" autocomplete="tel" placeholder="Introduzca su número de teléfono" required />
            </div>
            <div class="form-row">
              <label for="cust-pin">PIN</label>
              <input
                type="number"
                name="PIN"
                id="cust-pin"
                inputmode="numeric"
                pattern="\d{1,4}"
                min="0"
                max="9999"
                required
                placeholder="Debe tener 4 dígitos"
                oninput="this.value = this.value.replace(/[^0-9]/g,'').slice(0,4);"
              />
            </div>
          </div>

          <div class="form-row">
            <label>Tipo de entrega</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="Entrega" value="Tienda" />Ir a la tienda
              </label>
              <label class="radio-label">
                <input type="radio" name="Entrega" value="Domicilio" />Traer a domicilio
              </label>
            </div>
          </div>

          <div class="form-row">
            <label for="cust-address">Dirección (sólo si pide domicilio)</label>
            <input type="text" name="Direccion" id="cust-address" autocomplete="street-address" placeholder="Por favor, especifique bien su dirección" disabled />
          </div>

          <div class="form-row">
            <label for="form-items">Productos pedidos</label>
            <textarea name="Productos" id="form-items" rows="4" readonly></textarea>
          </div>

          <div class="form-inline-row">
            <div class="form-row form-row--narrow">
              <label for="form-total">Total a pagar</label>
              <input type="text" name="Total a pagar" id="form-total" readonly />
            </div>
            <div class="form-row">
              <label for="form-datetime">Fecha y hora</label>
              <input
                type="text"
                name="Fecha y hora"
                id="form-datetime"
                readonly
                aria-readonly="true"
                placeholder="D/M/AAAA - h:mm am/pm"
              />
            </div>
          </div>

          <footer class="modal-footer">
            <button type="submit" class="btn btn-primary">Enviar por WhatsApp 📲</button>
            <button type="button" id="order-cancel" class="btn">Cerrar</button>
          </footer>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal de confirmación de envío -->
  <div id="confirm-modal" class="modal-hidden" aria-hidden="true">
    <div class="modal-card confirm-card" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
      <div class="confirm-body">
        <p class="confirm-message">‼️AVISO IMPORTANTE‼️<br>Es posible que algunos de los productos que ha pedido no se encuentren disponibles. Usted solo pagará por los que reciba.</p>
        <p class="confirm-question">¿Desea continuar?</p>
      </div>
      <footer class="modal-footer">
        <button id="confirm-yes" class="btn btn-primary" disabled>Sí (5)</button>
        <button id="confirm-no" class="btn">No</button>
      </footer>
    </div>
  </div>

  <!-- Modal de estado (éxito / error de envío) -->
  <div id="status-modal" class="status-modal status-hidden" aria-hidden="true">
    <div class="status-card" id="status-text"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
